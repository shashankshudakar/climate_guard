<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClimateGuard | Register</title>
  <link rel="icon" href="assets/logo.png" type="image/png" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css?v=3" />
  <link rel="stylesheet" href="css/auth-enhancements.css" />
  <script src="js/theme.js"></script>
  <script src="js/api.js" type="module"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
<link rel="stylesheet" href="css/ui-enhancements.css?v=20260318">
</head>

<body class="register-page">
  <div class="auth-top-actions">
    <button id="langToggleBtn" class="btn btn-sm btn-outline-success border-2 fw-bold"
      style="border-radius: 20px; transition: all 0.3s ease;">Language</button>
    <button id="themeToggleBtn" class="theme-toggle-btn" title="Switch to Dark Mode">
      <i class="bi bi-moon-stars"></i>
    </button>
  </div>

  <div class="container d-flex justify-content-center align-items-center flex-column"
    style="min-height: 100vh; padding: 20px 0;">
    <div class="card p-4 shadow auth-card" style="max-width:560px; width:100%;">
      <h3 class="text-center mb-3"><span data-i18n="register-title">Register</span></h3>

      <div class="text-center mb-3">
        <img id="avatarPreview" src="assets/user_avatar.png" alt="Avatar Preview" width="84" height="84"
          class="rounded-circle border border-2 border-success" style="object-fit:cover;" />
        <div id="avatarGrid" class="d-flex flex-wrap justify-content-center gap-2 mt-2"></div>
        <label for="customAvatarInput" class="btn btn-sm btn-outline-primary mt-2">Upload Photo</label>
        <input type="file" id="customAvatarInput" accept="image/*" style="display:none;" />
        <button type="button" class="btn btn-sm btn-outline-success mt-2" id="openCameraRegBtn">Take Photo</button>
      </div>

      <input type="text" id="regName" class="form-control mb-3" placeholder="Full Name" data-i18n="full-name" />
      <input type="email" id="regEmail" class="form-control mb-3" placeholder="Email (Optional)"
        data-i18n="email-opt" />

      <select id="regDistrict" class="form-select mb-3">
        <option value="" disabled selected>Select District</option>
        <option value="Bagalkote">Bagalkote</option>
        <option value="Ballari">Ballari</option>
        <option value="Belagavi">Belagavi</option>
        <option value="Bengaluru Rural">Bengaluru Rural</option>
        <option value="Bengaluru Urban">Bengaluru Urban</option>
        <option value="Bidar">Bidar</option>
        <option value="Chamarajanagar">Chamarajanagar</option>
        <option value="Chikballapur">Chikballapur</option>
        <option value="Chikmagalur">Chikmagalur</option>
        <option value="Chitradurga">Chitradurga</option>
        <option value="Dakshina Kannada">Dakshina Kannada</option>
        <option value="Davanagere">Davanagere</option>
        <option value="Dharwad">Dharwad</option>
        <option value="Gadag">Gadag</option>
        <option value="Hassan">Hassan</option>
        <option value="Haveri">Haveri</option>
        <option value="Kalaburagi">Kalaburagi</option>
        <option value="Kodagu">Kodagu</option>
        <option value="Kolar">Kolar</option>
        <option value="Koppal">Koppal</option>
        <option value="Mandya">Mandya</option>
        <option value="Mysuru">Mysuru</option>
        <option value="Raichur">Raichur</option>
        <option value="Ramanagara">Ramanagara</option>
        <option value="Shimoga">Shimoga</option>
        <option value="Tumakuru">Tumakuru</option>
        <option value="Udupi">Udupi</option>
        <option value="Uttara Kannada">Uttara Kannada</option>
        <option value="Vijayanagara">Vijayanagara</option>
        <option value="Vijayapura">Vijayapura</option>
        <option value="Yadgir">Yadgir</option>
      </select>

      <div class="mb-3">
        <label class="form-label small fw-bold text-success">I am a:</label>
        <select id="regRole" class="form-select">
          <option value="farmer" selected>Farmer (Crop Tracking & Advisories)</option>
          <option value="public">Public User (Weather Alerts & Info)</option>
        </select>
      </div>

      <div class="input-group mb-2">
        <input type="tel" id="regPhone" class="form-control" placeholder="Mobile Number" data-i18n="mobile-number" />
        <button class="btn btn-outline-success" type="button" id="sendOtpBtn"><span data-i18n="send-otp">Send
            OTP</span></button>
      </div>

      <div id="otpSection" class="p-3 mb-3 border rounded bg-light" style="display:none;">
        <div class="input-group">
          <input type="text" id="regOtpInput" class="form-control" placeholder="4-digit OTP" maxlength="4" />
          <button class="btn btn-success" type="button" id="verifyOtpBtn"><span
              data-i18n="verify-otp">Verify</span></button>
        </div>
        <div class="d-flex justify-content-between mt-2">
          <small id="otpMessage"></small>
          <small><a href="#" id="resendOtpLink" class="text-success text-decoration-none disabled"
              style="pointer-events:none;opacity:.5;"><span data-i18n="resend-otp">Resend OTP</span><span
                id="resendTimer"> (30s)</span></a></small>
        </div>
      </div>

      <div class="input-group mb-3">
        <input type="password" id="regPassword" class="form-control" placeholder="Password" data-i18n="password" />
        <button class="btn btn-outline-secondary" type="button" id="toggleRegPassword"><span
            id="regEyeIcon">Show</span></button>
      </div>

      <div class="input-group mb-3">
        <input type="password" id="regConfirmPassword" class="form-control" placeholder="Confirm Password"
          data-i18n="confirm-password" />
        <button class="btn btn-outline-secondary" type="button" id="toggleRegConfirmPassword"><span
            id="regConfirmEyeIcon">Show</span></button>
      </div>

      <button id="registerBtn" class="btn register-btn w-100"><span data-i18n="register-title">Register</span></button>
      <div class="text-center mt-2"><span data-i18n="already-have-account">Already have account?</span> <a
          href="login.html"><span data-i18n="login-title">Login</span></a></div>
    </div>
  </div>

  <div id="cameraModalReg"
    style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:9999; align-items:center; justify-content:center;">
    <div style="background:#fff; border-radius:20px; padding:20px; max-width:420px; width:95%; text-align:center;">
      <video id="cameraPreviewReg" autoplay playsinline
        style="width:100%; border-radius:12px; background:#000; max-height:280px; object-fit:cover;"></video>
      <canvas id="cameraCanvasReg" style="display:none;"></canvas>
      <div class="d-flex gap-2 justify-content-center mt-3 flex-wrap">
        <button type="button" id="snapBtnReg" class="btn btn-success btn-sm">Snap</button>
        <button type="button" id="retakeBtnReg" class="btn btn-warning btn-sm" style="display:none;">Retake</button>
        <button type="button" id="useBtnReg" class="btn btn-primary btn-sm" style="display:none;">Use Photo</button>
        <button type="button" id="closeCameraRegBtn" class="btn btn-danger btn-sm">Cancel</button>
      </div>
    </div>
  </div>

  <script type="module">
    import api from './js/api.js';

    const avatarGrid = document.getElementById('avatarGrid');
    const avatarPreview = document.getElementById('avatarPreview');
    let selectedAvatar = 'assets/user_avatar.png';
    let generatedOTP = null;
    let isMobileVerified = false;
    let resendInterval = null;

    function makeAvatar(emoji, bg) {
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120"><rect width="120" height="120" rx="60" fill="${bg}"/><text x="60" y="75" font-size="60" text-anchor="middle">${emoji}</text></svg>`;
      return 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
    }

    [makeAvatar('👨', '#e3f2fd'), makeAvatar('👩', '#fce4ec'), makeAvatar('🧑', '#e8f5e9'), makeAvatar('👴', '#fff3e0'), makeAvatar('👵', '#fbe9e7'), makeAvatar('🧑‍💼', '#e0f7fa')].forEach((src) => {
      const img = document.createElement('img');
      img.src = src;
      img.width = 52;
      img.height = 52;
      img.style.borderRadius = '50%';
      img.style.cursor = 'pointer';
      img.addEventListener('click', () => {
        selectedAvatar = src;
        avatarPreview.src = src;
      });
      avatarGrid.appendChild(img);
    });

    document.getElementById('customAvatarInput').addEventListener('change', (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        selectedAvatar = ev.target.result;
        avatarPreview.src = selectedAvatar;
      };
      reader.readAsDataURL(file);
    });

    function startResendTimer() {
      const resendLink = document.getElementById('resendOtpLink');
      const timerSpan = document.getElementById('resendTimer');
      let timeLeft = 30;
      resendLink.style.pointerEvents = 'none';
      resendLink.style.opacity = '0.5';
      if (resendInterval) clearInterval(resendInterval);
      resendInterval = setInterval(() => {
        timeLeft -= 1;
        timerSpan.textContent = ` (${timeLeft}s)`;
        if (timeLeft <= 0) {
          clearInterval(resendInterval);
          timerSpan.textContent = '';
          resendLink.style.pointerEvents = 'auto';
          resendLink.style.opacity = '1';
        }
      }, 1000);
    }

    async function triggerOtpSend() {
      const phoneStr = document.getElementById('regPhone').value.trim();
      if (phoneStr.length < 10) {
        alert('Please enter a valid mobile number');
        return;
      }
      generatedOTP = String(Math.floor(1000 + Math.random() * 9000));
      document.getElementById('otpSection').style.display = 'block';
      document.getElementById('otpMessage').textContent = 'Sending OTP...';
      document.getElementById('sendOtpBtn').disabled = true;
      startResendTimer();
      
      try {
        await api.sendSms(phoneStr, `Your ClimateGuard OTP is ${generatedOTP}. Please do not share this code.`);
        document.getElementById('otpMessage').textContent = 'OTP sent to mobile';
      } catch (error) {
        document.getElementById('otpMessage').textContent = error.message || 'Error sending SMS';
        console.error('SMS Send Error:', error);
        // Fallback for demo purposes if TextBee isn't connected
        setTimeout(() => alert(`(Fallback) Verification code: ${generatedOTP}`), 300);
      }
    }

    document.getElementById('sendOtpBtn').addEventListener('click', triggerOtpSend);
    document.getElementById('resendOtpLink').addEventListener('click', (e) => { e.preventDefault(); triggerOtpSend(); });

    document.getElementById('verifyOtpBtn').addEventListener('click', () => {
      const enteredOTP = document.getElementById('regOtpInput').value.trim();
      if (enteredOTP !== generatedOTP) {
        document.getElementById('otpMessage').textContent = 'Invalid OTP';
        return;
      }
      isMobileVerified = true;
      document.getElementById('otpSection').style.display = 'none';
      const sendBtn = document.getElementById('sendOtpBtn');
      sendBtn.disabled = true;
      sendBtn.classList.remove('btn-outline-success');
      sendBtn.classList.add('btn-success');
      sendBtn.textContent = 'Verified';
    });

    function resetOtpFlow() {
      isMobileVerified = false;
      generatedOTP = null;
      document.getElementById('otpSection').style.display = 'none';
      document.getElementById('regOtpInput').value = '';
      document.getElementById('otpMessage').textContent = '';
      const sendBtn = document.getElementById('sendOtpBtn');
      sendBtn.disabled = false;
      sendBtn.classList.remove('btn-success');
      sendBtn.classList.add('btn-outline-success');
      sendBtn.textContent = 'Send OTP';
    }

    document.getElementById('regPhone').addEventListener('input', () => {
      resetOtpFlow();
    });

    function wireToggle(btnId, inputId, labelId) {
      document.getElementById(btnId).addEventListener('click', () => {
        const input = document.getElementById(inputId);
        const label = document.getElementById(labelId);
        if (input.type === 'password') {
          input.type = 'text';
          label.textContent = 'Hide';
        } else {
          input.type = 'password';
          label.textContent = 'Show';
        }
      });
    }
    wireToggle('toggleRegPassword', 'regPassword', 'regEyeIcon');
    wireToggle('toggleRegConfirmPassword', 'regConfirmPassword', 'regConfirmEyeIcon');

    document.getElementById('registerBtn').addEventListener('click', async () => {
      const name = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const phone = document.getElementById('regPhone').value.trim();
      const district = document.getElementById('regDistrict').value;
      const password = document.getElementById('regPassword').value;
      const confirm = document.getElementById('regConfirmPassword').value;

      if (!name || !phone || !password) {
        alert('Please fill required fields');
        return;
      }
      if (!district) {
        alert('Please select your district');
        return;
      }
      if (!isMobileVerified) {
        alert('Please verify mobile OTP first');
        return;
      }
      if (password !== confirm) {
        alert('Passwords do not match');
        return;
      }

      try {
        const user_role = document.getElementById('regRole').value;
        await api.register({ name, email, phone, password, district, user_role, avatar: selectedAvatar });

        // Send welcome alert SMS to the user's phone for their selected district
        try {
          await api.sendSms(phone, `Welcome to ClimateGuard! You are registered under ${district} district. You will receive climate alerts for your area.`);
        } catch (smsErr) {
          console.warn('Welcome SMS failed (non-blocking):', smsErr);
        }

        alert('Registration successful! You will receive climate alerts for ' + district + ' district.');
        window.location.href = 'login.html';
      } catch (error) {
        alert(error.message || 'Registration failed');
      }
    });

    window.__setRegisterAvatar = (dataUrl) => {
      selectedAvatar = dataUrl;
      avatarPreview.src = dataUrl;
    };
  </script>

  <script>
    (function () {
      const modal = document.getElementById('cameraModalReg');
      const video = document.getElementById('cameraPreviewReg');
      const canvas = document.getElementById('cameraCanvasReg');
      const snapBtn = document.getElementById('snapBtnReg');
      const retakeBtn = document.getElementById('retakeBtnReg');
      const useBtn = document.getElementById('useBtnReg');
      const openBtn = document.getElementById('openCameraRegBtn');
      const closeBtn = document.getElementById('closeCameraRegBtn');

      let stream = null;
      let capturedDataUrl = null;

      function closeCamera() {
        if (stream) {
          stream.getTracks().forEach((t) => t.stop());
          stream = null;
        }
        modal.style.display = 'none';
      }

      function openCamera() {
        modal.style.display = 'flex';
        snapBtn.style.display = '';
        retakeBtn.style.display = 'none';
        useBtn.style.display = 'none';
        canvas.style.display = 'none';
        video.style.display = '';

        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false })
          .then((s) => {
            stream = s;
            video.srcObject = s;
          })
          .catch(() => {
            alert('Camera access denied or unavailable.');
            closeCamera();
          });
      }

      openBtn.addEventListener('click', openCamera);
      closeBtn.addEventListener('click', closeCamera);

      snapBtn.addEventListener('click', () => {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        capturedDataUrl = canvas.toDataURL('image/jpeg', 0.92);
        video.style.display = 'none';
        canvas.style.display = 'block';
        snapBtn.style.display = 'none';
        retakeBtn.style.display = '';
        useBtn.style.display = '';
      });

      retakeBtn.addEventListener('click', () => {
        capturedDataUrl = null;
        canvas.style.display = 'none';
        video.style.display = '';
        snapBtn.style.display = '';
        retakeBtn.style.display = 'none';
        useBtn.style.display = 'none';
      });

      useBtn.addEventListener('click', () => {
        if (capturedDataUrl && window.__setRegisterAvatar) {
          window.__setRegisterAvatar(capturedDataUrl);
        }
        closeCamera();
      });
    })();
  </script>

  <script src="js/i18n.js?v=8" type="module"></script>
  <script src="js/auth-ui.js"></script>
<script src="js/ui-enhancements.js?v=20260318"></script>
</body>

</html>
